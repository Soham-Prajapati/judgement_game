name: judgement_client
description: Judgement multiplayer card game client
publish_to: none

version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  dio: ^5.4.3+1
  web_socket_channel: ^2.4.5
  shared_preferences: ^2.2.3
  go_router: ^13.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/cards/sprites/